<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 100px;
            height: 100px;
            border: 1px solid black;
        }
        .box1{
            background-color: red;
                /* z-index is only applicable to positioned elements (elements with a position value other than static) */      
            position: absolute;
            /* relative se gap maintain hota hai absolute m gap maintain ni hota  */
            top: 20px;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: -100;
        }
        .box2{
            background-color: green;
            position: absolute;
             top: 50px;
            /* top se area chodh diya pr neeche wale ko overlap krdiya */
            bottom: 50px;
            left: 50px;
            right: 50px;
            z-index: 1;

        }
        .box3{
            background-color: blue;
            position: absolute;
            top: 70px;
            bottom: 80px;
            left: 70px;
            right: 80px;
            z-index: 100;

            /* display: none; isseh gap maintain nii ho pa raha hai isliye visiblity tag use krrhe*/
                /* visibility: hidden; */
                
        }
        .box4{
            background-color: yellow;
            position: absolute;
            z-index: 0;
            top: 30px;
            bottom: 30px;
            left: 30px;
            right: 30px;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
</body>
</html>
