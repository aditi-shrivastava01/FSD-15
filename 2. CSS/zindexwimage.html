<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0%;
            height:100vh;
            display:flex;
            justify-content: center;
            align-items: center;
        }
        div{
            height: 150px;
            width: 150px;
            margin: 0%;
            border: 1px solid black;
        }
        .box1{
            position: absolute;
            background-image: url(https://www.shutterstock.com/image-photo/sun-sets-behind-mountain-ranges-600nw-2479236003.jpg);
            background-size: cover;
            top: 100px;
            left: 40%;
            z-index: 100;
        }
        .box2{
            position: absolute;
            background-image: url(https://cdn.pixabay.com/photo/2017/07/24/19/57/tiger-2535888_640.jpg);
            background-size: cover;
            top: 150px;
            left: 40%;
            z-index: 100;
        }
        .box3{
            position: absolute;
            background-image: url(https://thumbs.dreamstime.com/b/beautiful-rain-forest-ang-ka-nature-trail-doi-inthanon-national-park-thailand-36703721.jpg);
            background-size: cover;
            top: 200px;
            left: 40%;
            z-index: 100;
        }
        .box4{
            position: absolute;
            background-image: url(https://media.istockphoto.com/id/814423752/photo/eye-of-model-with-colorful-art-make-up-close-up.jpg?s=612x612&w=0&k=20&c=l15OdMWjgCKycMMShP8UK94ELVlEGvt7GmB_esHWPYE=);
            background-size: cover;
            top: 250px;
            left: 40%;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
</body>
</html>
