<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"  />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
      font-family: "Times New Roman", Times, serif;
    }
    body {
      height: 100vh;
    }
    .header {
      background-color: rgb(25, 84, 71);
      color: beige;
      padding: 20px;
      text-align: center;
    }
    .main {
      min-height: calc(100vh - 119px);
      display: flex;
    }
    .footer {
      background-color: rgb(25, 84, 71);
      color: white;
      padding: 20px;
      text-align: center;
    }
    /* navbar */
    .navbar {
        display: flex;
        background: rgb(75, 108, 102);
        justify-content: space-between;
        align-items: center;

    }
    .left{
        display: flex;
        justify-content: center;
        gap: 15px;
        
    }
    .left img{
        height: 50px;
        width: 50px;
    }
    .right{
        height: 50px;
        display: flex;
    }
    /* main content */
    .content{
        justify-content: center;
    }
    .content-heading{
        justify-content: center;
        text-align: center;
        margin: 10px;
        color: #308e67;
        gap: 10px;
        font-size: 1cm;   
    }
    .content-heading h4{
        text-align: center;
    }
</style>
<body>
    <div class="header">
        <div class="navbar">
            <div class="left">
                <img src="https://lh3.googleusercontent.com/vgqjCgZbDxD-zK9xj9mnkj9l0Sp2ZpYNQFZGiivdoTmY9xu3GeBVyHKZaD07fehcQEhGqV4knMBhlE3e2BHJjIySVtHc_IkbJytCdLEr">
                <h4>Home</h4>
                <h4>Menu</h4>
                <h4>About</h4>
                <h4>Contact</h4>
            </div>
            <div class="right">
                <div>
                <span class="material-symbols-outlined">search</span>
                </div>
            </div>
        </div>
    </div>
    <div class="main">
        <div class="content">
            <div class="content-heading">
                <h4>Welcome to Cafe Amado</h4>
                <h2>Delicious food</h2>
                <button>Order now</button>

            </div>
        </div>
    </div>
    <div class="footer">

    </div>
</body>
</html>
