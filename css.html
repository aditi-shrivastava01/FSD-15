<!DOCTYPE html>
<html lang="en">  <!--css is used to style layout of html the ui/ux (cascading style sheet)-->
<head>
    <link rel="stylesheet" href="./index.css">     <!--ISKO COMMENT KRNA PADEGA SELECTOR USE KRNE KE LIYE-->   <!-- //external css using style sheet: kuch toh tha pta ni sir ne hata diya-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style> 
        p{
            background-color: rgb(42, 165, 44) ; 
            color: rgb(112, 11, 48);
        }
        .p1{
            background-color: aqua;
        }
        #p2{
            background-color: antiquewhite;
        }
    </style> <!-- style tag-->
    <!--link tag neeche krdiya toh bg colour extrnal wala h-->
</head>  <!--  inline>internal>external  //external is better :code clear: file size ni badhega S
                                        //inline css isliye ni krte qki dry code apply ni krta ie dont repeat yourself
                                        HOW TO MAKE CSS FUNCTIONAL(BY INTERNAL AND EXTERNAL CSS)-->
<body>
    <p style="color:brown; background-color: rgb(63, 37, 6); font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;">Lorem ipsum do rit amet, eum aut exequam  dolore!</p>  <!-- //inline css using style attribute lgta h element ke andr-->
    <p class="p1">Lorem, ipsum dolor sit amet cx tempora voluptatum vitae. Expedita, iure?</p> <!-- //internal css using style tag/attribute lgta h head ke andr ISLIYE
    head ke andr use krte h qki hierarchy maintain krne ke liye -->
    <p id="p2" >Lorem ipsum dolor sit amet consectetur adipisicing elit. Maiores, necessitatibus!</p>
</body>
</html>
